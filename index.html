<html lang="en">

    button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:inherit}.hidden{display:none!important}.visually-hidden{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
    .app{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:12px 0 54px}

    .top-actions{display:flex;align-items:center;gap:7px;margin-left:auto}.quick-expense,.icon-btn,.btn,.small-btn,.tab-btn{border:1px solid transparent;border-radius:8px;background:none;color:inherit;font-weight:780;box-shadow:none}.quick-expense{min-height:34px;padding:6px 10px;border-color:var(--line);background:#fff;font-size:.78rem}.quick-expense:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}.icon-btn{width:36px;height:36px;display:grid;place-items:center;border-color:var(--line);background:#fff}.icon-btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.icon-btn:hover{color:var(--blue);border-color:#b8c7ee;background:var(--blue-soft)}
    .tabs{position:sticky;top:52px;z-index:70;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:4px;padding:4px;margin:10px 0 16px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.88);backdrop-filter:blur(10px)}
    .tab-btn{min-height:43px;padding:8px 10px;color:var(--muted)}.tab-btn:hover{background:#f1f2ef;color:var(--ink)}.tab-btn.active{background:var(--ink);color:#fff}.tab-panel[hidden]{display:none!important}
    .card{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.96);box-shadow:none}.section{padding:20px}.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--line)}.section-head h2,.compact-head h2{margin:0;font-size:1.18rem;letter-spacing:-.02em}.subtle{color:var(--muted);font-size:.84rem}.actions{display:flex;flex-wrap:wrap;gap:7px}.btn{min-height:39px;padding:8px 13px;background:var(--ink);color:#fff}.btn:hover{filter:brightness(.96)}.btn.secondary{background:var(--blue-soft);color:var(--blue)}.btn.ghost{border-color:var(--line);background:#fff;color:var(--ink)}.btn.danger{background:var(--red-soft);color:var(--red)}.btn.github{background:#24292f}.btn-circle{width:39px;height:39px;min-height:0;padding:0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1.15rem;line-height:1}.small-btn{min-height:31px;padding:5px 8px;background:#f1f3ef;color:var(--muted);font-size:.76rem}.small-btn.danger{background:var(--red-soft);color:var(--red)}

    /* Details and packing */
.details-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.compact-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.memory-editor{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s ease}.memory-editor.open{grid-template-rows:1fr;margin-bottom:14px}.memory-editor-inner{overflow:hidden}.memory-form{display:flex;flex-direction:column;gap:10px;padding-top:2px}.memory-form .field-group{display:flex;flex-direction:column;gap:5px}.memory-form .field-group label{color:var(--muted);font-size:.76rem;font-weight:800}.memory-editor-actions{display:flex;justify-content:flex-end;gap:7px}.memory-list{display:grid;gap:7px}.memory-item{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px;border:1px solid var(--line);border-radius:8px}.memory-item strong{display:block}.memory-meta,.memory-note{color:var(--muted);font-size:.76rem}.memory-note{margin-top:4px}.memory-actions{display:flex;gap:4px}.info-list{display:grid;border-top:1px solid var(--line)}.info-row{display:grid;grid-template-columns:130px minmax(0,1fr);gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}.info-row>span:first-child{color:var(--muted);font-size:.76rem;font-weight:800}.note-box{margin-top:12px;padding:11px;border:1px solid var(--line);border-radius:8px;background:#fafaf8;white-space:pre-wrap}.tools{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}.packing-form{display:grid;grid-template-columns:1fr auto;gap:7px;margin-bottom:10px}.packing-item{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:9px;border:1px solid var(--line);border-radius:8px}.packing-item.done span{text-decoration:line-through;color:var(--muted)}.empty{padding:26px;border:1px dashed #cbd1cc;border-radius:8px;text-align:center;color:var(--muted)}
    /* Dialogs */
    dialog{width:min(620px,calc(100% - 24px));max-height:90vh;padding:0;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink);box-shadow:none}dialog.wide{width:min(900px,calc(100% - 24px))}dialog::backdrop{background:rgba(28,34,31,.48);backdrop-filter:blur(2px)}.dialog-shell{display:flex;flex-direction:column;max-height:90vh}.dialog-head,.dialog-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;background:#fafaf8}.dialog-head{border-bottom:1px solid var(--line)}.dialog-foot{justify-content:flex-end;border-top:1px solid var(--line)}.dialog-head h2{margin:0;font-size:1.08rem}.dialog-body{padding:16px;overflow:auto}.close{width:34px;height:34px;border:1px solid var(--line);border-radius:7px;background:#fff}.notice{padding:10px;border:1px solid #e0d4ac;border-radius:8px;background:var(--gold-soft);color:#6d551d;font-size:.78rem}.toast{position:fixed;z-index:9999;left:50%;bottom:22px;transform:translate(-50%,20px);padding:9px 13px;border-radius:8px;background:#202525;color:#fff;font-size:.8rem;font-weight:750;opacity:0;pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,0)}.table-wrap{overflow:auto}.detail-table{width:100%;border-collapse:collapse}.detail-table th,.detail-table td{padding:9px;border-bottom:1px solid var(--line);text-align:left}.detail-table th{color:var(--muted);font-size:.7rem;text-transform:uppercase}.right{text-align:right!important}

<body>
  <main class="app">
    <header class="topbar">
      <div class="sync" id="syncStatus" data-state="local" role="status" aria-live="polite"><span class="sync-dot"></span><span id="syncText">Saved locally</span></div>
      <div class="top-actions">
        <button class="icon-btn" id="settingsBtn" type="button" aria-label="Settings" title="Settings"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></button>
      </div>
    </header>

    <nav class="tabs" aria-label="Trip sections">
      <button class="tab-btn active" data-tab="todoPanel" type="button">Schedule</button>
      <button class="tab-btn" data-tab="budgetPanel" type="button">Budget</button>
      <button class="tab-btn" data-tab="detailsPanel" type="button">Trip details</button>
      <button class="tab-btn" data-tab="collectionPanel" type="button">Collection</button>
      <button class="tab-btn" data-tab="packingPanel" type="button">To-do</button>
    </nav>

    <section class="tab-panel" id="todoPanel">
      <div class="card section">
        <div class="panel-tools">
          <div class="schedule-view-switch" role="group" aria-label="Schedule view">
            <button class="schedule-view-btn active" data-schedule-view="calendar" type="button">Calendar</button>
            <button class="schedule-view-btn" data-schedule-view="list" type="button">List</button>
          </div>
        </div>
        <div class="schedule-view" id="calendarScheduleView">
          <div class="calendar-frame" id="calendarFrame"><div class="calendar" id="calendar"></div></div>
        </div>
        <div class="schedule-view" id="todayScheduleView" hidden>
          <div class="today-todo-list" id="todayTodoList"></div>
        </div>
        <div class="add-activity-zone">
          <div class="add-activity-actions"><div class="actions"><button class="btn secondary btn-circle" id="openScheduleBtn" type="button" aria-label="Add activity" title="Add activity">＋</button></div></div>
          <form class="schedule-toolbar" id="quickScheduleForm">
            <input class="field" id="quickActivity" maxlength="120" placeholder="Activity name…" required />
            <input class="field" id="quickScheduleDate" type="date" required />
            <input class="field" id="quickStartTime" type="time" required />
            <input class="field" id="quickEndTime" type="time" required />
            <button class="btn" type="submit">Add</button>
          </form>
        </div>
      </div>
    </section>

  <script>
  "use strict";
  const STORAGE_KEY="tripItinerarySite_v1",TOKEN_KEY="tripItineraryGitHubToken_v1",TAB_KEY="tripItineraryActiveTab_v2",SCHEDULE_VIEW_KEY="tripItineraryScheduleView_v1";
  const DEFAULT_GITHUB={owner:"sseoyi",repo:"trip",branch:"main",path:"data.json"};
  const HOUR_HEIGHT=56,SNAP_MINUTES=15;
  const $=(s,p=document)=>p.querySelector(s),$$=(s,p=document)=>[...p.querySelectorAll(s)];
  const todayISO=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};
  const parseDate=s=>{const [y,m,d]=String(s||todayISO()).split("-").map(Number);return new Date(y,m-1,d)};
  const iso=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const addDays=(s,n)=>{const d=parseDate(s);d.setDate(d.getDate()+n);return iso(d)};
  const diffDays=(a,b)=>Math.round((parseDate(b)-parseDate(a))/86400000);
  const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  const uid=p=>`${p}_${crypto.randomUUID?.()||Date.now()+"_"+Math.random().toString(16).slice(2)}`;
  const timeMinutes=t=>{const [h,m]=String(t||"00:00").split(":").map(Number);return h*60+m};
  const minutesTime=m=>`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
  const addTime=(t,n)=>minutesTime(Math.min(1439,timeMinutes(t)+n));
  const timeLabel=t=>{const d=new Date();const [h,m]=String(t||"00:00").split(":").map(Number);d.setHours(h,m,0,0);return new Intl.DateTimeFormat(undefined,{hour:"numeric",minute:"2-digit"}).format(d)};
  const formatDate=(s,opt={})=>new Intl.DateTimeFormat(undefined,{weekday:opt.weekday??"short",day:"numeric",month:"short",year:opt.year??"numeric"}).format(parseDate(s));
  const mapLink=l=>l?`<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(l)}" target="_blank" rel="noopener">📍 ${esc(l)}</a>`:"";
  function defaultState(){const t=todayISO();return{version:4,trip:{startDate:t,endDate:addDays(t,6),totalBudget:0,currency:"THB",roomAddress:"",phone1Name:"",phone1Number:"",phone2Name:"",phone2Number:"",otherDetails:""},github:{...DEFAULT_GITHUB},schedules:[],expenses:[],importantPlaces:[],importantTimes:[],packing:[],collections:[],selectedBudgetDate:t}}
  function normalizeState(v){const b=defaultState(),trip=v?.trip||{};const schedules=Array.isArray(v?.schedules)?v.schedules.map(x=>{const start=x.startTime||x.time||"09:00";let end=x.endTime||addTime(start,60);if(timeMinutes(end)<=timeMinutes(start))end=addTime(start,60);return{id:x.id||uid("schedule"),date:x.date||b.trip.startDate,startTime:start,endTime:end,activity:x.activity||"Untitled",location:x.location||"",note:x.note||"",done:!!x.done}}):[];return{...b,...v,version:4,trip:{...b.trip,...trip,totalBudget:Math.max(0,Number(trip.totalBudget||0)),roomAddress:trip.roomAddress??trip.stay??"",otherDetails:trip.otherDetails??trip.notes??""},github:{owner:v?.github?.owner||DEFAULT_GITHUB.owner,repo:v?.github?.repo||DEFAULT_GITHUB.repo,branch:v?.github?.branch||DEFAULT_GITHUB.branch,path:v?.github?.path||DEFAULT_GITHUB.path},schedules,expenses:Array.isArray(v?.expenses)?v.expenses:[],importantPlaces:Array.isArray(v?.importantPlaces)?v.importantPlaces:[],importantTimes:Array.isArray(v?.importantTimes)?v.importantTimes:[],packing:Array.isArray(v?.packing)?v.packing:[],collections:Array.isArray(v?.collections)?v.collections:Array.isArray(v?.collection)?v.collection:[],selectedBudgetDate:v?.selectedBudgetDate||todayISO()}}
  function loadState(){try{return normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY)||"null"))}catch(e){console.error(e);return defaultState()}}
  let state=loadState(),toastTimer,publishTimer,publishRunning=false,publishAgain=false,calendarPage=0,collectionDraftImage="",dragState=null,scheduleView=localStorage.getItem(SCHEDULE_VIEW_KEY)||"calendar";
  const getToken=()=>{try{return localStorage.getItem(TOKEN_KEY)||""}catch{return""}};
  const setToken=t=>{try{t?localStorage.setItem(TOKEN_KEY,t):localStorage.removeItem(TOKEN_KEY)}catch{}};
  function saveLocal(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));return true}catch(e){console.error(e);setStatus("error","Browser storage is full");toast("Could not save — remove some large images");return false}}
  function toast(m){const e=$("#toast");e.textContent=m;e.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove("show"),2100)}
  function setStatus(type,text){$("#syncStatus").dataset.state=type;$("#syncText").textContent=text}
  function commit(message){const saved=saveLocal();renderAll();toast(message);if(saved)schedulePublish()}
  function schedulePublish(){clearTimeout(publishTimer);if(!getToken()){setStatus("missing","Saved locally · GitHub token needed");return}setStatus("syncing","Change queued");publishTimer=setTimeout(requestPublish,650)}
  async function requestPublish(){if(publishRunning){publishAgain=true;return}publishRunning=true;do{publishAgain=false;try{await publishData()}catch(e){console.error(e);setStatus("error",e.message||"Publish failed");toast("GitHub publish failed")} }while(publishAgain);publishRunning=false}
  function utf8Base64(s){const bytes=new TextEncoder().encode(s);let bin="";for(let i=0;i<bytes.length;i+=8192)bin+=String.fromCharCode(...bytes.subarray(i,i+8192));return btoa(bin)}
  async function publishData(){const token=getToken();if(!token)throw new Error("GitHub token needed");const g=state.github;setStatus("syncing","Publishing data.json…");const url=`https://api.github.com/repos/${encodeURIComponent(g.owner)}/${encodeURIComponent(g.repo)}/contents/${g.path.split("/").map(encodeURIComponent).join("/")}`;let sha;const check=await fetch(`${url}?ref=${encodeURIComponent(g.branch)}`,{headers:{Accept:"application/vnd.github+json",Authorization:`Bearer ${token}`,"X-GitHub-Api-Version":"2022-11-28"}});if(check.ok)sha=(await check.json()).sha;else if(check.status!==404)throw new Error(`GitHub ${check.status}`);const body={message:`Update trip data ${new Date().toISOString()}`,content:utf8Base64(JSON.stringify(state,null,2)),branch:g.branch,...(sha?{sha}:{})};const put=await fetch(url,{method:"PUT",headers:{Accept:"application/vnd.github+json",Authorization:`Bearer ${token}`,"X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"},body:JSON.stringify(body)});if(!put.ok){let detail="";try{detail=(await put.json()).message}catch{}throw new Error(detail||`GitHub ${put.status}`)}setStatus("success","Change updated");return true}
  function openDialog(d){if(!d.open)d.showModal()}
  function closeDialog(d){if(d.open)d.close()}
  function tripDays(){const s=state.trip.startDate,e=state.trip.endDate;if(!s||!e||diffDays(s,e)<0)return[];return Array.from({length:diffDays(s,e)+1},(_,i)=>addDays(s,i))}
  function formatMoney(n){const c=state.trip.currency||"THB";try{return new Intl.NumberFormat(undefined,{style:"currency",currency:c,maximumFractionDigits:["VND","KRW","JPY"].includes(c)?0:2}).format(Number(n||0))}catch{return `${Number(n||0).toLocaleString()} ${c}`}}
  function sortedSchedules(list=state.schedules){return[...list].sort((a,b)=>`${a.date} ${a.startTime}`.localeCompare(`${b.date} ${b.startTime}`))}
  function initialCalendarPage(){calendarPage=0}
  function pageDays(){return tripDays()}
  function renderCalendar(){const visible=pageDays(),cal=$("#calendar");if(!visible.length){cal.innerHTML=`<div class="calendar-empty">No trip dates.</div>`;return}cal.style.setProperty("--days",visible.length);const cols=visible.map(d=>{const events=sortedSchedules(state.schedules.filter(x=>x.date===d));const weekday=new Intl.DateTimeFormat(undefined,{weekday:"short"}).format(parseDate(d)),date=new Intl.DateTimeFormat(undefined,{day:"numeric",month:"short"}).format(parseDate(d));return`<section class="day-column ${d===todayISO()?"today":""}" data-date="${esc(d)}"><div class="day-column-head"><strong>${esc(weekday)}</strong><span>${esc(date)}</span></div><div class="day-stack">${events.length?events.map(eventHTML).join(""):`<div class="day-empty">No plans</div>`}</div></section>`}).join("");cal.innerHTML=`<div class="calendar-board">${cols}</div>`;bindCalendarEvents();}
  function renderTodayTodo(){const days=tripDays(),all=sortedSchedules(state.schedules);$("#todayTodoList").innerHTML=all.length?days.map(d=>{const items=all.filter(x=>x.date===d);if(!items.length)return"";return`<section class="schedule-list-day"><div class="schedule-list-date">${esc(formatDate(d))}</div>${items.map(x=>`<article class="today-todo-item ${timePeriodClass(x.startTime)} ${x.done?"done":""}" data-id="${esc(x.id)}"><input type="checkbox" data-today-action="toggle" aria-label="Mark ${esc(x.activity)} complete" ${x.done?"checked":""}/><div class="today-todo-copy"><span class="todo-time">${esc(timeLabel(x.startTime))}–${esc(timeLabel(x.endTime))}</span><strong>${esc(x.activity)}</strong>${x.location?`<small>📍 ${esc(x.location)}</small>`:""}${x.note?`<p>${esc(x.note)}</p>`:""}</div><button class="small-btn today-todo-edit" data-today-action="edit" type="button">Edit</button></article>`).join("")}</section>`}).join(""):`<div class="empty">No schedule items.</div>`}
  function setScheduleView(view){scheduleView=view==="list"?"list":"calendar";localStorage.setItem(SCHEDULE_VIEW_KEY,scheduleView);$("#calendarScheduleView").hidden=scheduleView!=="calendar";$("#todayScheduleView").hidden=scheduleView!=="list";$$('[data-schedule-view]').forEach(b=>b.classList.toggle("active",b.dataset.scheduleView===scheduleView))}
  function timePeriodClass(t){const m=timeMinutes(t);return m>=20*60?"time-night":m>=17*60?"time-evening":m>=13*60?"time-afternoon":"time-morning"}
  function eventHTML(x){const details=[x.location?`📍 ${x.location}`:"",x.note||""].filter(Boolean).join("\n");return`<article class="calendar-event ${timePeriodClass(x.startTime)} ${x.done?"done":""}" data-id="${esc(x.id)}" title="Drag to another day or tap to edit"><span class="event-time">${esc(timeLabel(x.startTime))}–${esc(timeLabel(x.endTime))}</span><span class="event-name">${esc(x.activity)}</span>${details?`<span class="event-details">${esc(details)}</span>`:""}<div class="event-actions"><button class="event-mini" type="button" data-event-action="toggle" title="Complete">${x.done?"↺":"✓"}</button><button class="event-mini" type="button" data-event-action="edit" title="Edit">✎</button></div></article>`}
  function bindCalendarEvents(){$$(".calendar-event").forEach(el=>el.addEventListener("pointerdown",startDrag));}
  function startDrag(e){if(e.target.closest("button"))return;const el=e.currentTarget,item=state.schedules.find(x=>x.id===el.dataset.id);if(!item)return;e.preventDefault();const ghost=document.createElement("div");ghost.className=`drag-ghost ${timePeriodClass(item.startTime)}`;ghost.textContent=`${timeLabel(item.startTime)} · ${item.activity}`;document.body.append(ghost);dragState={item,el,ghost,moved:false,startX:e.clientX,startY:e.clientY};moveGhost(e);window.addEventListener("pointermove",moveDrag,{passive:false});window.addEventListener("pointerup",endDrag,{once:true});}
  function moveGhost(e){if(!dragState)return;dragState.ghost.style.left=`${e.clientX+12}px`;dragState.ghost.style.top=`${e.clientY+12}px`}
  function moveDrag(e){if(!dragState)return;e.preventDefault();moveGhost(e);if(Math.hypot(e.clientX-dragState.startX,e.clientY-dragState.startY)>5)dragState.moved=true;$$('.day-column.drop-target').forEach(x=>x.classList.remove('drop-target'));document.elementFromPoint(e.clientX,e.clientY)?.closest('.day-column')?.classList.add('drop-target')}
  function endDrag(e){window.removeEventListener("pointermove",moveDrag);$$('.day-column.drop-target').forEach(x=>x.classList.remove('drop-target'));if(!dragState)return;const d=dragState;d.ghost.remove();if(!d.moved){openScheduleEditor(d.item);dragState=null;return}const col=document.elementFromPoint(e.clientX,e.clientY)?.closest('.day-column');if(col&&d.item.date!==col.dataset.date){d.item.date=col.dataset.date;commit("Activity moved")}dragState=null}
  function renderCollection(){const grid=$("#collectionGrid");if(!state.collections.length){grid.innerHTML=`<div class="collection-empty">No saved items.</div>`;return}grid.innerHTML=[...state.collections].sort((a,b)=>Number(b.createdAt||0)-Number(a.createdAt||0)).map(x=>`<article class="collection-card ${x.image?"":"no-image"}" data-id="${esc(x.id)}" ${x.image?`style="background-image:url('${esc(x.image)}')"`:""}><div class="collection-actions"><button type="button" data-collection-action="edit" title="Edit">✎</button><button type="button" data-collection-action="delete" title="Delete">×</button></div><div class="collection-copy"><span class="collection-type">${esc(x.type||"Other")}</span><h3>${esc(x.name)}</h3>${x.details?`<p>${esc(x.details)}</p>`:""}</div></article>`).join("")}

  async function compressImage(file){return new Promise((resolve,reject)=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{const max=900,scale=Math.min(1,max/Math.max(img.width,img.height)),c=document.createElement("canvas");c.width=Math.max(1,Math.round(img.width*scale));c.height=Math.max(1,Math.round(img.height*scale));c.getContext("2d").drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);let out=c.toDataURL("image/webp",.8);if(out.length>650000)out=c.toDataURL("image/jpeg",.7);resolve(out)};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("Could not read image"))};img.src=url})}
  function totalSpent(){return state.expenses.reduce((s,x)=>s+Number(x.amount||0),0)}function daySpent(d){return state.expenses.filter(x=>x.date===d).reduce((s,x)=>s+Number(x.amount||0),0)}
  function ensureBudgetDate(){const days=tripDays(),t=todayISO();if(!state.selectedBudgetDate)state.selectedBudgetDate=t;if(days.length&&!days.includes(state.selectedBudgetDate))state.selectedBudgetDate=days.includes(t)?t:days[0]}
  function renderBudget(){ensureBudgetDate();const total=Number(state.trip.totalBudget||0),spent=totalSpent(),remaining=total-spent,d=state.selectedBudgetDate,items=state.expenses.filter(x=>x.date===d).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));$("#remainingCard").classList.toggle("over",remaining<0);$("#remainingLabel").textContent=remaining<0?"Over budget":"Remaining";$("#remainingValue").textContent=total?formatMoney(Math.abs(remaining)):"Set a budget";$("#totalBudgetValue").textContent=formatMoney(total);$("#spentDayValue").textContent=formatMoney(daySpent(d));$("#spentOverallValue").textContent=formatMoney(spent);$("#budgetDayTitle").textContent=d===todayISO()?"Today":formatDate(d,{year:undefined});$("#budgetDayDate").textContent=formatDate(d);const days=tripDays(),i=days.indexOf(d);$("#prevBudgetDay").disabled=days.length&&i<=0;$("#nextBudgetDay").disabled=days.length&&i>=days.length-1;$("#expenseList").innerHTML=items.length?items.map(x=>`<article class="row-item" data-expense-id="${esc(x.id)}"><div class="row-main"><strong>${esc(x.note)}</strong><small>${esc(formatDate(x.date))}</small></div><div class="amount">−${esc(formatMoney(x.amount))}</div><div><button class="small-btn" data-expense-action="edit" type="button">Edit</button> <button class="small-btn danger" data-expense-action="delete" type="button">Delete</button></div></article>`).join(""):`<div class="empty">No expenses for this day.</div>`}

  function renderTimes(){const l=$("#timesList"),a=[...state.importantTimes].sort((x,y)=>`${x.date} ${x.time}`.localeCompare(`${y.date} ${y.time}`));l.innerHTML=a.length?a.map(x=>`<article class="memory-item" data-id="${esc(x.id)}"><div><strong>${esc(x.title)}</strong><div class="memory-meta">${esc(formatDate(x.date))} · ${esc(timeLabel(x.time))}</div>${x.details?`<div class="memory-note">${esc(x.details)}</div>`:""}</div><div class="memory-actions"><button class="small-btn" data-time-action="edit">Edit</button><button class="small-btn danger" data-time-action="delete">Delete</button></div></article>`).join(""):`<div class="empty">No important times yet.</div>`}
